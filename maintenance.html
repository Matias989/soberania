<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soberanía Cognitiva | Mantenimiento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --red: #d63a2a;
      --neon-blue: #1a8cff;
      --broken-white: #e8e0d0;
      --text: #d0c8b8;
      --muted: #7b7b7b;
      --font-title: 'Bebas Neue', sans-serif;
      --font-serif: 'Cormorant Garamond', serif;
      --font-body: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(214,58,42,0.08), transparent 35vw),
        radial-gradient(circle at 85% 12%, rgba(26,140,255,0.08), transparent 32vw),
        var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .frame {
      width: min(920px, 100%);
      border: 1px solid rgba(255, 255, 255, 0.09);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)), var(--surface);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      padding: clamp(30px, 5vw, 52px);
      position: relative;
      overflow: hidden;
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 2px;
      background: linear-gradient(90deg, var(--red), transparent 36%, rgba(26,140,255,0.45), transparent 78%);
    }

    .badge {
      font-size: 10px;
      letter-spacing: 2.8px;
      text-transform: uppercase;
      color: var(--neon-blue);
      border: 1px solid rgba(26,140,255,0.35);
      width: fit-content;
      padding: 5px 12px;
      margin-bottom: 24px;
    }

    h1 {
      font-family: var(--font-title);
      font-size: clamp(42px, 9vw, 90px);
      line-height: 0.95;
      letter-spacing: 2px;
      color: var(--broken-white);
      margin-bottom: 14px;
    }

    h1 span {
      color: var(--red);
      display: block;
    }

    .subtitle {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: clamp(18px, 2.6vw, 26px);
      color: var(--broken-white);
      line-height: 1.5;
      margin-bottom: 18px;
    }

    .copy {
      font-size: clamp(14px, 2vw, 16px);
      line-height: 1.8;
      color: var(--muted);
      max-width: 58ch;
    }

    .copy strong {
      color: var(--text);
      font-weight: 500;
    }

    .footer {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 11px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: #626262;
    }
  </style>
</head>
<body>
  <main class="frame" role="main" aria-labelledby="maintenanceTitle">
    <div class="badge">Soberanía Cognitiva</div>
    <h1 id="maintenanceTitle">
      <span>Sitio en</span>
      mantenimiento
    </h1>
    <p class="subtitle">Estamos ajustando este territorio para volver con mejoras.</p>
    <p class="copy">
      El sitio está temporalmente fuera de servicio para tareas de actualización.
      Intentá nuevamente en unos minutos. <strong>Gracias por la espera.</strong>
    </p>
    <div class="footer">Estado del servicio: mantenimiento activo</div>
  </main>
</body>
</html>
