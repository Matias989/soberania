<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soberanía Cognitiva | Mantenimiento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --red: #d63a2a;
      --neon-blue: #1a8cff;
      --broken-white: #e8e0d0;
      --text: #d0c8b8;
      --muted: #7b7b7b;
      --font-title: 'Bebas Neue', sans-serif;
      --font-serif: 'Cormorant Garamond', serif;
      --font-body: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(214,58,42,0.08), transparent 35vw),
        radial-gradient(circle at 85% 12%, rgba(26,140,255,0.08), transparent 32vw),
        var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .frame {
      width: min(920px, 100%);
      border: 1px solid rgba(255, 255, 255, 0.09);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)), var(--surface);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      padding: clamp(30px, 5vw, 52px);
      position: relative;
      overflow: hidden;
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 2px;
      background: linear-gradient(90deg, var(--red), transparent 36%, rgba(26,140,255,0.45), transparent 78%);
    }

    .badge {
      font-size: 10px;
      letter-spacing: 2.8px;
      text-transform: uppercase;
      color: var(--neon-blue);
      border: 1px solid rgba(26,140,255,0.35);
      width: fit-content;
      padding: 5px 12px;
      margin-bottom: 24px;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .lang-switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      padding: 6px 11px 6px 10px;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
      transition: border-color .2s, box-shadow .2s, transform .2s;
    }
    .lang-switch:hover {
      border-color: rgba(26,140,255,0.4);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 0 0 1px rgba(26,140,255,.12);
      transform: translateY(-1px);
    }
    .lang-switch:focus-within {
      border-color: rgba(26,140,255,.6);
      box-shadow: 0 0 0 2px rgba(26,140,255,.2), 0 10px 24px rgba(26,140,255,.14);
    }
    .lang-switch::after {
      content: '';
      width: 7px;
      height: 7px;
      border-right: 2px solid #b9cde9;
      border-bottom: 2px solid #b9cde9;
      transform: rotate(45deg);
      margin-left: -2px;
      margin-right: 2px;
      opacity: .9;
      pointer-events: none;
    }
    .lang-switch label {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .lang-switch select {
      border: 0;
      background: transparent;
      color: #f3eee2;
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 0 14px 0 4px;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      text-shadow: 0 0 12px rgba(26,140,255,.15);
    }
    .lang-switch select option {
      background: #111318;
      color: #ece6d8;
    }

    h1 {
      font-family: var(--font-title);
      font-size: clamp(42px, 9vw, 90px);
      line-height: 0.95;
      letter-spacing: 2px;
      color: var(--broken-white);
      margin-bottom: 14px;
    }

    h1 span {
      color: var(--red);
      display: block;
    }

    .subtitle {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: clamp(18px, 2.6vw, 26px);
      color: var(--broken-white);
      line-height: 1.5;
      margin-bottom: 18px;
    }

    .copy {
      font-size: clamp(14px, 2vw, 16px);
      line-height: 1.8;
      color: var(--muted);
      max-width: 58ch;
    }

    .copy strong {
      color: var(--text);
      font-weight: 500;
    }

    .footer {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 11px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: #626262;
    }
  </style>
</head>
<body>
  <main class="frame" role="main" aria-labelledby="maintenanceTitle">
    <div class="toolbar">
      <div class="badge" id="badgeText">Soberanía Cognitiva</div>
      <div class="lang-switch">
        <label for="langSelect">Lang</label>
        <select id="langSelect" aria-label="Cambiar idioma de mantenimiento">
          <option value="es">ES</option>
          <option value="eu">EU</option>
          <option value="zh">ZH</option>
          <option value="pt">PT</option>
          <option value="de">DE</option>
          <option value="ru">RU</option>
        </select>
      </div>
    </div>
    <h1 id="maintenanceTitle">
      <span id="titleLine1">Sitio en</span>
      <span id="titleLine2" style="color: var(--broken-white);">mantenimiento</span>
    </h1>
    <p class="subtitle" id="subtitleText">Estamos ajustando este territorio para volver con mejoras.</p>
    <p class="copy" id="copyText">
      El sitio está temporalmente fuera de servicio para tareas de actualización. Intentá nuevamente en unos minutos. <strong>Gracias por la espera.</strong>
    </p>
    <div class="footer" id="footerText">Estado del servicio: mantenimiento activo</div>
  </main>
  <script>
    const MAINTENANCE_I18N = {
      es: {
        badge: 'Soberanía Cognitiva',
        titleLine1: 'Sitio en',
        titleLine2: 'mantenimiento',
        subtitle: 'Estamos ajustando este territorio para volver con mejoras.',
        copy: 'El sitio está temporalmente fuera de servicio para tareas de actualización. Intentá nuevamente en unos minutos. <strong>Gracias por la espera.</strong>',
        footer: 'Estado del servicio: mantenimiento activo'
      },
      eu: {
        badge: 'Cognitive Sovereignty',
        titleLine1: 'Site under',
        titleLine2: 'maintenance',
        subtitle: 'We are tuning this territory to come back better.',
        copy: 'The site is temporarily offline for updates. Please try again in a few minutes. <strong>Thank you for your patience.</strong>',
        footer: 'Service status: maintenance mode active'
      },
      zh: {
        badge: '认知主权',
        titleLine1: '站点正在',
        titleLine2: '维护中',
        subtitle: '我们正在调整这个空间，稍后将以更好的状态返回。',
        copy: '网站因更新任务暂时不可用。请稍后再试。<strong>感谢你的耐心等待。</strong>',
        footer: '服务状态：维护模式已启用'
      },
      pt: {
        badge: 'Soberania Cognitiva',
        titleLine1: 'Site em',
        titleLine2: 'manutenção',
        subtitle: 'Estamos ajustando este território para voltar com melhorias.',
        copy: 'O site está temporariamente fora do ar para atualizações. Tente novamente em alguns minutos. <strong>Obrigado pela sua paciência.</strong>',
        footer: 'Status do serviço: manutenção ativa'
      },
      de: {
        badge: 'Kognitive Souveränität',
        titleLine1: 'Website in',
        titleLine2: 'Wartung',
        subtitle: 'Wir passen dieses Gebiet an, um verbessert zurückzukehren.',
        copy: 'Die Website ist wegen Aktualisierungen vorübergehend nicht verfügbar. Bitte versuche es in ein paar Minuten erneut. <strong>Danke für deine Geduld.</strong>',
        footer: 'Dienststatus: Wartungsmodus aktiv'
      },
      ru: {
        badge: 'Когнитивный суверенитет',
        titleLine1: 'Сайт на',
        titleLine2: 'обслуживании',
        subtitle: 'Мы дорабатываем этот ресурс, чтобы вернуться в улучшенном виде.',
        copy: 'Сайт временно недоступен из-за обновлений. Пожалуйста, попробуйте снова через несколько минут. <strong>Спасибо за ожидание.</strong>',
        footer: 'Статус сервиса: режим обслуживания активен'
      }
    };

    function applyMaintenanceLanguage(lang) {
      const selected = MAINTENANCE_I18N[lang] ? lang : 'es';
      const t = MAINTENANCE_I18N[selected];

      document.getElementById('badgeText').textContent = t.badge;
      document.getElementById('titleLine1').textContent = t.titleLine1;
      document.getElementById('titleLine2').textContent = t.titleLine2;
      document.getElementById('subtitleText').textContent = t.subtitle;
      document.getElementById('copyText').innerHTML = t.copy;
      document.getElementById('footerText').textContent = t.footer;

      document.documentElement.lang = selected === 'eu' ? 'en' : selected;
      localStorage.setItem('site_lang', selected);
    }

    const langSelect = document.getElementById('langSelect');
    const savedLang = localStorage.getItem('site_lang') || 'es';
    langSelect.value = MAINTENANCE_I18N[savedLang] ? savedLang : 'es';
    applyMaintenanceLanguage(langSelect.value);
    langSelect.addEventListener('change', (e) => applyMaintenanceLanguage(e.target.value));
  </script>
</body>
</html>
